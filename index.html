<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ψηφιακὸν Κομποσκοίνι</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            background-color: #0f0f0f; color: #d4af37; font-family: 'Times New Roman', serif; 
            display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
        }

        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s; }
        
        /* Σταδιακή Φωτεινότητα Layer */
        #dim-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9000; pointer-events: none; opacity: 0; 
        }

        #prayer-area { 
            text-align: center; padding: 20px 0; flex-shrink: 0; 
            cursor: grab; width: 100%; touch-action: pan-y;
        }
        #prayer-text { font-size: 1.6rem; line-height: 1.3; min-height: 4.5rem; display: flex; align-items: center; justify-content: center; }
        .swipe-hint { font-size: 0.75rem; opacity: 0.5; margin-top: 5px; letter-spacing: 1px; }

        /* Dropdown Settings */
        .settings-container { 
            width: 100%; max-width: 400px; margin: 0 auto 10px; border: 1px solid #d4af37; 
            border-radius: 12px; background: rgba(212, 175, 55, 0.05); flex-shrink: 0; z-index: 9001;
        }
        #settings-toggle { 
            width: 100%; padding: 12px; background: rgba(212, 175, 55, 0.1); color: #d4af37; 
            border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }
        #settings-content { max-height: 0; overflow-y: auto; transition: max-height 0.3s ease-out; }
        #settings-content.open { max-height: 65vh; padding: 15px; }

        select, input { 
            background: #1a1a1a; color: #d4af37; border: 1px solid #d4af37; padding: 10px; 
            border-radius: 8px; width: 100%; margin-bottom: 12px; text-align: center; font-size: 1.1rem;
        }
        
        /* Dimmer Slider */
        .dimmer-box { margin-bottom: 15px; text-align: center; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: #333; height: 6px; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #d4af37; border-radius: 50%; }

        .option-label { font-size: 0.9rem; text-transform: uppercase; opacity: 0.7; display: block; margin-bottom: 6px; text-align: center; font-weight: bold; }
        .toggle-row { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; margin-bottom: 8px; }

        #reminders-list { list-style: none; padding: 0; margin: 5px 0; }
        .reminder-item { display: flex; justify-content: space-between; background: rgba(212,175,55,0.1); padding: 8px 12px; border-radius: 5px; margin-bottom: 5px; font-size: 1rem; }

        /* Main Area */
        #main-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; }
        #bead-container { 
            width: 65vw; height: 65vw; max-width: 270px; max-height: 270px; border-radius: 50%; 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border: 2px solid #d4af37; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: transform 0.05s; z-index: 1;
        }
        #bead-container:active { transform: scale(0.96); border-color: #fff; }
        #current-count { font-size: 3.8rem; font-weight: bold; line-height: 1; }
        #target-label { font-size: 0.9rem; opacity: 0.7; margin-top: 8px; font-weight: bold; }

        .total-box { font-size: 1rem; opacity: 0.7; margin-bottom: 8px; font-weight: bold; }
        .reset-btn { background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-size: 1rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash-screen"><h2 style="color:#d4af37">Κομποσκοίνι</h2></div>
    <div id="dim-overlay"></div>

    <div id="prayer-area">
        <div id="prayer-text">Κύριε Ἰησοῦ Χριστέ,<br>ἐλέησόν με</div>
        <div class="swipe-hint">← ΣΥΡΕ ΓΙΑ ΑΛΛΑΓΗ →</div>
    </div>

    <div class="settings-container">
        <button id="settings-toggle" onclick="toggleSettings()">⚙ ΡΥΘΜΙΣΕΙΣ <span id="arrow">▼</span></button>
        <div id="settings-content">
            
            <div class="dimmer-box">
                <span class="option-label">Φωτεινότητα Οθόνης</span>
                <input type="range" id="dimmer" min="0" max="0.9" step="0.05" value="0" oninput="adjustDim(this.value)">
            </div>

            <span class="option-label">Στόχος</span>
            <select id="knot-select" onchange="updateSettings()">
                <option value="33">33 κόμποι</option>
                <option value="100">100 κόμποι</option>
                <option value="custom">Επιλογή κόμπων</option>
                <option value="timer">Χρόνος (λεπτά)</option>
                <option value="free">Χωρίς στόχο</option>
            </select>
            <input type="number" id="custom-input" style="display:none;" oninput="updateSettings()">

            <div class="toggle-group" style="border-bottom: 1px solid rgba(212,175,55,0.1); margin-bottom:12px; padding-bottom:5px;">
                <span class="option-label">Υπενθυμίσεις</span>
                <div style="display:flex; gap:5px; margin-bottom:8px;">
                    <input type="time" id="reminder-time" style="margin:0;">
                    <button onclick="addReminder()" style="background:#d4af37; border:none; border-radius:8px; padding:0 15px; font-weight:bold; font-size:1.2rem;">+</button>
                </div>
                <ul id="reminders-list"></ul>
            </div>

            <div class="toggle-group">
                <span class="option-label">Ήχος & Δόνηση</span>
                <div class="toggle-row"><input type="checkbox" id="snd-on" onclick="onlyOne(this,'snd')"> Σε κάθε κόμπο</div>
                <div class="toggle-row"><input type="checkbox" id="snd-off" onclick="onlyOne(this,'snd')"> Στον τερματισμό</div>
                <div id="vib-controls">
                    <div class="toggle-row"><input type="checkbox" id="vib-on" onclick="onlyOne(this,'vib')"> Δόνηση παντού</div>
                </div>
            </div>
        </div>
    </div>

    <div id="main-area">
        <div id="bead-container" onclick="countBead()">
            <span id="current-count">33</span>
            <span id="target-label">ΥΠΟΛΟΙΠΟ</span>
        </div>
        <div style="text-align:center;">
            <div class="total-box">ΣΥΝΟΛΟ: <span id="total">0</span></div>
            <button class="reset-btn" onclick="resetAll()">ΜΗΔΕΝΙΣΜΟΣ</button>
        </div>
    </div>

    <audio id="bead-sound" src="click.mp3" preload="auto"></audio>

    <script>
        let count = 0, total = 0, target = 33, mode = 'knots', timerSeconds = 0, timerInterval = null;
        let pIndex = 0, touchStartX = 0;
        let reminders = JSON.parse(localStorage.getItem('prayer_reminders') || '[]');
        
        const prayers = [
            "Κύριε Ἰησοῦ Χριστέ,<br>ἐλέησόν με",
            "Ὑπεραγία Θεοτόκε,<br>σῶσον ἡμᾶς",
            "Ἅγιε τοῦ Θεοῦ,<br>πρέσβευε ὑπὲρ ἡμῶν"
        ];

        // Swipe Logic
        const pArea = document.getElementById('prayer-area');
        pArea.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        pArea.addEventListener('touchend', e => {
            let diff = e.changedTouches[0].screenX - touchStartX;
            if (Math.abs(diff) > 50) {
                pIndex = diff > 0 ? (pIndex > 0 ? pIndex - 1 : prayers.length - 1) : (pIndex < prayers.length - 1 ? pIndex + 1 : 0);
                document.getElementById('prayer-text').innerHTML = prayers[pIndex];
            }
        }, {passive: true});

        function adjustDim(val) { document.getElementById('dim-overlay').style.opacity = val; }

        function toggleSettings() {
            const c = document.getElementById('settings-content');
            c.classList.toggle('open');
            document.getElementById('arrow').innerText = c.classList.contains('open') ? '▲' : '▼';
        }

        function onlyOne(checkbox, group) {
            if (group === 'snd') { document.getElementById('snd-on').checked = checkbox === document.getElementById('snd-on') && checkbox.checked; document.getElementById('snd-off').checked = checkbox === document.getElementById('snd-off') && checkbox.checked; }
        }

        function countBead() {
            const sOn = document.getElementById('snd-on').checked, sOff = document.getElementById('snd-off').checked;
            const vOn = document.getElementById('vib-on').checked;
            
            if (mode === 'timer' && !timerInterval && timerSeconds > 0) {
                timerInterval = setInterval(() => { timerSeconds--; if (timerSeconds <= 0) { clearInterval(timerInterval); finish(); } updateUI(); }, 1000);
            }

            total++;
            if (mode === 'knots') {
                count++;
                if (target > 0 && count >= target) {
                    count = 0;
                    if (sOn || sOff) { const a = document.getElementById('bead-sound'); a.currentTime = 0; a.play().catch(()=>{}); }
                    if (navigator.vibrate) navigator.vibrate([400, 200, 400]);
                } else {
                    if (sOn) { const a = document.getElementById('bead-sound'); a.currentTime = 0; a.play().catch(()=>{}); }
                    if (vOn && navigator.vibrate) navigator.vibrate(60);
                }
            }
            updateUI();
        }

        function updateUI() {
            const d = document.getElementById('current-count'), l = document.getElementById('target-label');
            if (mode === 'knots') {
                d.innerText = target === 0 ? total : Math.max(0, target - count);
                l.innerText = target === 0 ? "ΣΥΝΟΛΟ" : "ΥΠΟΛΟΙΠΟ";
            } else {
                d.innerText = `${Math.floor(timerSeconds/60)}:${(timerSeconds%60).toString().padStart(2,'0')}`;
                l.innerText = "ΧΡΟΝΟΣ";
            }
            document.getElementById('total').innerText = total;
        }

        function updateSettings() {
            const s = document.getElementById('knot-select'), c = document.getElementById('custom-input');
            mode = s.value === 'timer' ? 'timer' : 'knots';
            c.style.display = (s.value === 'custom' || s.value === 'timer') ? 'block' : 'none';
            target = s.value === 'free' ? 0 : (s.value === 'custom' ? parseInt(c.value)||0 : parseInt(s.value));
            if(mode === 'timer') timerSeconds = (parseInt(c.value)||0)*60;
            resetAll();
        }

        function resetAll() { count = 0; total = 0; clearInterval(timerInterval); timerInterval = null; updateUI(); }

        function addReminder() {
            const t = document.getElementById('reminder-time').value;
            if (t && !reminders.includes(t)) { reminders.push(t); reminders.sort(); saveRem(); renderRem(); Notification.requestPermission(); }
        }
        function saveRem() { localStorage.setItem('prayer_reminders', JSON.stringify(reminders)); }
        function renderRem() {
            document.getElementById('reminders-list').innerHTML = reminders.map((t, i) => `<li class="reminder-item"><span>${t}</span><span onclick="remRem(${i})" style="color:#ff4444; font-weight:bold; cursor:pointer;">✕</span></li>`).join('');
        }
        function remRem(i) { reminders.splice(i, 1); saveRem(); renderRem(); }

        window.addEventListener('load', () => { 
            renderRem();
            setTimeout(() => { document.getElementById('splash-screen').style.opacity='0'; setTimeout(()=>document.getElementById('splash-screen').style.display='none', 800); }, 1500);
        });

        // iOS Audio Fix
        document.addEventListener('touchstart', () => { const a = document.getElementById('bead-sound'); a.play().then(()=>a.pause()).catch(()=>{}); }, {once: true});
    </script>
</body>
</html>
